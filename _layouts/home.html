---
layout: default
---
<p class="tagline">{{ site.description }}</p>

{{ content }}

<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-card">
    <div class="meta">{{ post.date | date: "%b %-d, %Y" }}</div>
    <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
    <p>{{ post.excerpt | strip_html | truncatewords: 24 }}</p>
  </li>
  {% endfor %}
</ul>
